name: precip-downscaling-tf
# Environment for TensorFlow-based models (U-Net + WGAN-GP, scripts 06–09)
# and all analysis/visualization scripts (scripts 12–18).
# Install with:  conda env create -f environment_tf.yml
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy>=1.24
  - xarray>=2023.1
  - netCDF4>=1.6
  - matplotlib>=3.7
  - cartopy>=0.21
  - pandas>=2.0
  - seaborn>=0.13
  - scipy>=1.11
  - scikit-image>=0.21
  - scikit-learn>=1.3
  - pip
  - pip:
    - cdsapi>=0.6
    - tensorflow>=2.12
